<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/png" href="assets/charts_logo.png" />
    <link rel="stylesheet" href="css/material-theme.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/manage-charts.css" />
    <link rel="stylesheet" href="css/chart-catalog.css" />
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="css/custom-catalogs.css" />
    <title>Signal K Charts Manager</title>
</head>

<body>
    <div class="container">
        <div class="tab-container">
            <button class="tab active" data-tab="manage" onclick="openTab(event, 'manage')">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="margin-right: 8px;">
                    <path d="M19.5 3.5L18 2l-1.5 1.5L15 2l-1.5 1.5L12 2l-1.5 1.5L9 2 7.5 3.5 6 2v14H3v3c0 1.66 1.34 3 3 3h12c1.66 0 3-1.34 3-3V2l-1.5 1.5zM19 19c0 .55-.45 1-1 1s-1-.45-1-1v-3H8V5h11v14z"/>
                    <path d="M9 7h6v2H9zm7 0h2v2h-2zm-7 3h6v2H9zm7 0h2v2h-2z"/>
                </svg>
                Manage Charts
            </button>
            <button class="tab" data-tab="download" onclick="openTab(event, 'download')">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="margin-right: 8px;">
                    <path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2z"/>
                    <path d="M13 12.67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"/>
                </svg>
                Download from URL
            </button>
            <button class="tab" data-tab="convert" onclick="openTab(event, 'convert')">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="margin-right: 8px;">
                    <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
                </svg>
                Convert
            </button>
            <button class="tab" data-tab="catalog" onclick="openTab(event, 'catalog')" id="catalogTabBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="margin-right: 8px;">
                    <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/>
                </svg>
                Chart Catalog
                <span id="catalogBadge" class="catalog-tab-badge" style="display: none;"></span>
            </button>
            <button class="tab" data-tab="customCatalogs" onclick="openTab(event, 'customCatalogs')" id="customCatalogsTabBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="margin-right: 8px;">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
                </svg>
                NOAA Charts
            </button>
        </div>

        <div id="manage" class="tab-content active">
            <div id="manageOutput">
                <div class="empty-state">
                    <div class="empty-state-icon">Loading...</div>
                    <div class="empty-state-text">Loading charts...</div>
                </div>
            </div>
        </div>

        <div id="download" class="tab-content">
            <div id="chartLockerOutput">
            </div>
        </div>

        <div id="convert" class="tab-content">
            <div id="convertOutput"></div>
        </div>

        <div id="catalog" class="tab-content">
            <div id="catalogOutput">
                <div class="empty-state">
                    <div class="empty-state-icon">Loading...</div>
                    <div class="empty-state-text">Loading catalogs...</div>
                </div>
            </div>
        </div>

        <div id="customCatalogs" class="tab-content">
            <div id="customCatalogsOutput">
                <div class="empty-state">
                    <div class="empty-state-icon">Loading...</div>
                    <div class="empty-state-text">Loading chart sets...</div>
                </div>
            </div>
        </div>

        <script src="vendor/leaflet/leaflet.js"></script>
        <script src="js/emoji-utils.js"></script>
        <script src="js/tabs.js"></script>
        <script src="js/manage-charts-enhanced.js"></script>
        <script src="js/download-simple.js"></script>
        <script src="js/chart-convert.js"></script>
        <script src="js/chart-catalog.js"></script>
        <script src="js/noaa-chart-selector.js"></script>
        <script type="module" src="index.js"></script>
    </div>
</body>

</html>
