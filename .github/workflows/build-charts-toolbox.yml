name: Build charts-toolbox image

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'docker/charts-toolbox/**'
      - '.github/workflows/build-charts-toolbox.yml'

env:
  IMAGE: ghcr.io/${{ github.repository }}/charts-toolbox

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      # Read the VERSION file once and expose its trimmed value to later
      # steps so the produced image carries an explicit `:1.0.0`-style
      # tag.  Bumping the file is the deliberate way to cut a new
      # release; `:latest` rolls automatically alongside.
      - name: Read VERSION
        id: version
        run: |
          version=$(tr -d '[:space:]' < docker/charts-toolbox/VERSION)
          if [ -z "$version" ]; then
            echo "::error::docker/charts-toolbox/VERSION is empty"
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Refuse to overwrite a published :VERSION tag.  Consumers
      # (notably the plugin's converter, which pins to a specific
      # version) rely on a given tag pointing at a fixed image
      # forever.  A `docker/charts-toolbox/**` change without a
      # matching VERSION bump would otherwise silently re-push the
      # same tag with different content; this guard fails the build
      # so the maintainer has to bump VERSION deliberately.
      - name: Verify VERSION tag is unique
        run: |
          tag="${{ env.IMAGE }}:${{ steps.version.outputs.value }}"
          if docker manifest inspect "$tag" >/dev/null 2>&1; then
            echo "::error::Image tag $tag already exists in the registry."
            echo "::error::Bump docker/charts-toolbox/VERSION before pushing changes to docker/charts-toolbox/**."
            exit 1
          fi
          echo "Tag $tag is unpublished — proceeding with build."

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker/charts-toolbox
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.value }}
            ${{ env.IMAGE }}:${{ github.sha }}
